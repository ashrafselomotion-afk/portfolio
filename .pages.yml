media:
  input: assets/uploads
  output: /assets/uploads
  extensions: [mp4, webm, mov, jpg, jpeg, png, webp, gif]

content:
  - name: work
    label: Work & Reels
    type: file
    path: content/work.json
    format: json
    description: "Add as many clips as you like per section. Each is one tile in the gallery."
    fields:
      - name: motion
        label: Motion Graphics
        type: list
        fields: &clip
          - { name: label, label: Label, type: string }
          - name: type
            label: Video source
            type: select
            default: file
            options:
              values: [none, file, vimeo, youtube]
          - { name: src, label: "File path, or Vimeo / YouTube / Drive link", type: string }
      - { name: ai, label: AI Creation, type: list, fields: *clip }
      - { name: video, label: Video Editing, type: list, fields: *clip }
      - { name: social, label: Social Media Design, type: list, fields: *clip }
